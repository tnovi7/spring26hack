<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#033a4d">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/main/css/styles.css">
    <title>{{ page_title }} | Fight the Bully</title>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">Fight the Bully</div>
            <nav class="nav-links">
                <a href="/dashboard/">Dashboard</a>
                <a href="/complaints/">Complaints</a>
                <a href="/seatplan/">Seat Plan</a>
                <a href="/ai/">AI</a>
                <a href="/ledger/">Ledger</a>
                <a href="/sos/">SOS</a>
                <a href="/rules/">Rules</a>
            </nav>
            <button id="logout" class="ghost-button">Logout</button>
        </header>

        <main class="page-container">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <span>Bullies are weak inside, you are strong united.</span>
        </footer>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        }
    </script>
    <script src="/static/main/js/app.js"></script>
</body>
</html>
